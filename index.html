document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Montserrat';\n  font-style: normal;\n  font-weight: 900;\n  font-display: swap;\n  src: url(\"82ce90d6-1598-4c62-b032-229ef1c1281f\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>/* ============================================================\n   УНИСТРОЙ.АРЕНДА — Landing styles\n   Brand palette (strict):\n   #364B4B dark teal (base) · #A5FF00 lime (ACCENTS ONLY)\n   #E5FFF1 mint (light bg) · #FFFFFF white\n   Neutrals: #17161A ink · #262729 graphite · #B1B3B3 gray\n   Type: headings — wide bold grotesque (Druk Wide → Montserrat 800 upper)\n         body/UI — TT Norms Expanded → Montserrat\n   ============================================================ */\n\n:root {\n  --dark: #364B4B;\n  --dark-2: #2B3D3D;\n  --dark-3: #223030;\n  --accent: #A5FF00;\n  --accent-deep: #8FE000;\n  --mint: #E5FFF1;\n  --mint-2: #F2FBF6;\n  --white: #FFFFFF;\n  --ink: #17161A;\n  --graphite: #262729;\n  --gray: #B1B3B3;\n  --gray-2: #8A8C8C;\n  --line: rgba(54, 75, 75, 0.12);\n  --line-dark: rgba(255, 255, 255, 0.12);\n\n  --font-display: 'Druk Wide', 'Archivo', 'Montserrat', system-ui, sans-serif;\n  --font-body: 'TT Norms Pro Expanded', 'Montserrat', system-ui, sans-serif;\n\n  --maxw: 1240px;\n  --pad: clamp(20px, 5vw, 64px);\n  --r-sm: 8px;\n  --r-md: 14px;\n  --r-lg: 22px;\n  --shadow-sm: 0 2px 8px rgba(23, 22, 26, 0.06);\n  --shadow-md: 0 14px 40px rgba(23, 22, 26, 0.10);\n  --shadow-lg: 0 30px 80px rgba(23, 22, 26, 0.16);\n  --ease: cubic-bezier(0.22, 0.61, 0.36, 1);\n}\n\n* { box-sizing: border-box; }\n\nhtml { scroll-behavior: smooth; }\n@media (prefers-reduced-motion: reduce) { html { scroll-behavior: auto; } }\n\nbody {\n  margin: 0;\n  font-family: var(--font-body);\n  font-size: 17px;\n  line-height: 1.55;\n  color: var(--graphite);\n  background: var(--white);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\nimg { max-width: 100%; display: block; }\na { color: inherit; text-decoration: none; }\nbutton { font-family: inherit; cursor: pointer; }\n\n/* ---------- Type ---------- */\n.display {\n  font-family: var(--font-display);\n  font-weight: 800;\n  text-transform: uppercase;\n  letter-spacing: 0.01em;\n  line-height: 0.98;\n  margin: 0;\n}\nh1.display { font-size: clamp(34px, 6vw, 72px); }\nh2.display { font-size: clamp(28px, 4.4vw, 50px); }\nh3.display { font-size: clamp(20px, 2.4vw, 28px); }\n\n.eyebrow {\n  font-family: var(--font-body);\n  font-weight: 700;\n  text-transform: uppercase;\n  letter-spacing: 0.16em;\n  font-size: 13px;\n  color: var(--dark);\n  display: inline-flex;\n  align-items: center;\n  gap: 10px;\n  margin: 0 0 18px;\n}\n.eyebrow::before {\n  content: \"\";\n  width: 28px; height: 2px;\n  background: var(--accent-deep);\n}\n.on-dark .eyebrow { color: var(--accent); }\n.on-dark .eyebrow::before { background: var(--accent); }\n\n.lead { font-size: clamp(17px, 1.5vw, 20px); line-height: 1.55; color: var(--graphite); }\n.on-dark { color: var(--white); }\n.on-dark .lead { color: rgba(255,255,255,0.82); }\n.muted { color: var(--gray-2); }\n.mark { color: var(--dark); position: relative; white-space: nowrap; }\n.mark::after {\n  content: \"\"; position: absolute; left: -2px; right: -2px; bottom: 2px; height: 36%;\n  background: var(--accent); z-index: -1; border-radius: 2px;\n}\n\n/* ---------- Layout ---------- */\n.section { padding: clamp(64px, 9vw, 120px) 0; }\n.container { width: 100%; max-width: var(--maxw); margin: 0 auto; padding: 0 var(--pad); }\n.section-head { max-width: 760px; margin-bottom: clamp(32px, 5vw, 56px); }\n.section-head.center { margin-left: auto; margin-right: auto; text-align: center; }\n.section-head .lead { margin-top: 18px; }\n\n.bg-dark { background: var(--dark); color: var(--white); }\n.bg-mint { background: var(--mint); }\n.bg-white { background: var(--white); }\n\n/* ---------- Buttons ---------- */\n.btn {\n  display: inline-flex; align-items: center; justify-content: center; gap: 10px;\n  font-family: var(--font-body); font-weight: 700; font-size: 16px;\n  padding: 16px 28px; border-radius: 999px; border: 2px solid transparent;\n  transition: transform .18s var(--ease), background .18s var(--ease), border-color .18s var(--ease), color .18s var(--ease);\n  min-height: 52px; line-height: 1;\n}\n.btn:active { transform: translateY(1px) scale(0.99); }\n.btn-accent { background: var(--accent); color: var(--ink); }\n.btn-accent:hover { background: var(--accent-deep); }\n.btn-dark { background: var(--dark); color: var(--white); }\n.btn-dark:hover { background: var(--dark-2); }\n.btn-outline { background: transparent; border-color: currentColor; color: var(--dark); }\n.btn-outline:hover { background: var(--dark); color: var(--white); border-color: var(--dark); }\n.on-dark .btn-outline { color: var(--white); }\n.on-dark .btn-outline:hover { background: var(--accent); color: var(--ink); border-color: var(--accent); }\n.btn-lg { padding: 19px 34px; font-size: 17px; min-height: 60px; }\n.btn-block { width: 100%; }\n.btn:focus-visible { outline: 3px solid var(--accent); outline-offset: 3px; }\n\na:focus-visible, button:focus-visible, input:focus-visible, select:focus-visible, summary:focus-visible {\n  outline: 3px solid var(--accent-deep); outline-offset: 2px; border-radius: 6px;\n}\n\n/* ---------- Header ---------- */\n.site-header {\n  position: sticky; top: 0; z-index: 60;\n  background: var(--dark); color: var(--white);\n  transition: padding .25s var(--ease), box-shadow .25s var(--ease), background .25s var(--ease);\n}\n.site-header .bar {\n  display: flex; align-items: center; gap: 28px;\n  padding: 18px var(--pad); transition: padding .25s var(--ease);\n}\n.site-header.shrink { box-shadow: 0 10px 30px rgba(23,22,26,0.18); }\n.site-header.shrink .bar { padding: 11px var(--pad); }\n\n.logo { display: flex; align-items: center; gap: 11px; font-family: var(--font-display); font-weight: 800; text-transform: uppercase; letter-spacing: 0.02em; font-size: 17px; color: var(--white); white-space: nowrap; }\n.logo .mark-sq { width: 30px; height: 30px; border-radius: 7px; background: var(--accent); display: grid; place-items: center; color: var(--ink); font-size: 17px; }\n.logo small { display: block; font-family: var(--font-body); font-weight: 600; letter-spacing: 0.14em; font-size: 10px; color: var(--accent); text-transform: uppercase; margin-top: 2px; }\n\n.nav { display: flex; gap: 26px; margin-left: 14px; }\n.nav a { font-weight: 500; font-size: 15px; color: rgba(255,255,255,0.8); position: relative; padding: 4px 0; transition: color .15s; }\n.nav a::after { content:\"\"; position:absolute; left:0; right:100%; bottom:-2px; height:2px; background: var(--accent); transition: right .2s var(--ease); }\n.nav a:hover { color: var(--white); }\n.nav a:hover::after { right: 0; }\n\n.header-right { margin-left: auto; display: flex; align-items: center; gap: 18px; }\n.header-phone { font-weight: 700; font-size: 15px; color: var(--white); white-space: nowrap; }\n.header-phone:hover { color: var(--accent); }\n\n.burger { display: none; width: 46px; height: 46px; border: none; background: rgba(255,255,255,0.08); border-radius: 10px; flex-direction: column; gap: 5px; align-items: center; justify-content: center; }\n.burger span { width: 20px; height: 2px; background: var(--white); transition: .2s var(--ease); }\n.burger.open span:nth-child(1){ transform: translateY(7px) rotate(45deg); }\n.burger.open span:nth-child(2){ opacity: 0; }\n.burger.open span:nth-child(3){ transform: translateY(-7px) rotate(-45deg); }\n\n/* mobile menu */\n.mobile-menu { display: none; }\n\n/* ---------- Hero ---------- */\n.hero { position: relative; background: var(--dark); color: var(--white); overflow: hidden; padding: clamp(56px,8vw,104px) 0 clamp(48px,7vw,88px); }\n.hero::before {\n  content:\"\"; position:absolute; inset:0;\n  background:\n    radial-gradient(900px 500px at 88% -10%, rgba(165,255,0,0.10), transparent 60%),\n    radial-gradient(700px 500px at -5% 110%, rgba(165,255,0,0.05), transparent 60%);\n  pointer-events:none;\n}\n.hero .container { position: relative; display: grid; grid-template-columns: 1.05fr 0.95fr; gap: clamp(32px, 5vw, 64px); align-items: center; }\n.hero h1 { margin-bottom: 22px; }\n.hero h1 .em { color: var(--accent); }\n.hero-sub { max-width: 540px; margin-bottom: 32px; }\n.hero-cta { display: flex; flex-wrap: wrap; gap: 14px; margin-bottom: 40px; }\n.hero-trust { display: grid; grid-template-columns: repeat(4, 1fr); gap: 22px; border-top: 1px solid var(--line-dark); padding-top: 28px; }\n.trust-num { font-family: var(--font-display); font-weight: 800; font-size: clamp(26px, 3vw, 38px); color: var(--accent); line-height: 1; margin-bottom: 8px; }\n.trust-label { font-size: 13.5px; color: rgba(255,255,255,0.7); line-height: 1.35; }\n\n.hero-visual { position: relative; }\n.hero-card-img { aspect-ratio: 4/5; border-radius: var(--r-lg); overflow: hidden; box-shadow: var(--shadow-lg); }\n.hero-float {\n  position: absolute; left: -26px; bottom: 34px;\n  background: var(--white); color: var(--ink); border-radius: var(--r-md);\n  padding: 18px 22px; box-shadow: var(--shadow-lg); min-width: 220px;\n}\n.hero-float .fl-label { font-size: 12.5px; color: var(--gray-2); font-weight: 600; }\n.hero-float .fl-num { font-family: var(--font-display); font-weight: 800; font-size: 26px; color: var(--dark); margin-top: 2px; }\n.hero-float .fl-num span { color: var(--dark); }\n\n/* ---------- Image placeholder ---------- */\n.ph {\n  position: relative; background: var(--mint);\n  background-image: repeating-linear-gradient(135deg, rgba(54,75,75,0.06) 0 2px, transparent 2px 11px);\n  display: grid; place-items: center; color: var(--dark); overflow: hidden;\n}\n.ph::after {\n  content: attr(data-label);\n  font-family: 'Montserrat', monospace; font-size: 12px; font-weight: 600; letter-spacing: 0.04em;\n  text-transform: uppercase; color: rgba(54,75,75,0.55);\n  border: 1px dashed rgba(54,75,75,0.35); padding: 7px 12px; border-radius: 6px; background: rgba(255,255,255,0.5);\n}\n.ph.dark { background: var(--dark-2); background-image: repeating-linear-gradient(135deg, rgba(255,255,255,0.05) 0 2px, transparent 2px 11px); }\n.ph.dark::after { color: rgba(255,255,255,0.6); border-color: rgba(255,255,255,0.3); background: rgba(0,0,0,0.15); }\n\n/* ---------- Cards ---------- */\n.grid { display: grid; gap: 22px; }\n.grid-2 { grid-template-columns: repeat(2, 1fr); }\n.grid-3 { grid-template-columns: repeat(3, 1fr); }\n.grid-4 { grid-template-columns: repeat(4, 1fr); }\n\n.card {\n  background: var(--white); border: 1px solid var(--line); border-radius: var(--r-md);\n  padding: 28px; transition: transform .2s var(--ease), box-shadow .2s var(--ease), border-color .2s var(--ease);\n}\n.card:hover { transform: translateY(-4px); box-shadow: var(--shadow-md); border-color: transparent; }\n.card .ic {\n  width: 50px; height: 50px; border-radius: 12px; background: var(--mint);\n  display: grid; place-items: center; margin-bottom: 18px; color: var(--dark);\n}\n.card .ic svg { width: 24px; height: 24px; }\n.card h3 { font-size: 19px; font-weight: 700; margin: 0 0 8px; color: var(--ink); }\n.card p { margin: 0; font-size: 15.5px; color: var(--gray-2); line-height: 1.5; }\n.bg-mint .card { background: var(--white); }\n\n/* ---------- Solution split ---------- */\n.split { display: grid; grid-template-columns: 0.8fr auto 1.2fr; gap: 0; align-items: stretch; border-radius: var(--r-lg); overflow: hidden; box-shadow: var(--shadow-md); }\n.split-col { padding: clamp(28px, 4vw, 48px); }\n.split-you { background: var(--mint); }\n.split-us { background: var(--dark); color: var(--white); }\n.split-arrow { background: var(--accent); display: grid; place-items: center; padding: 0 14px; color: var(--in ========================\n   RESPONSIVE\n   ============================================================ */\n@media (max-width: 1100px) {\n  .hero .container { grid-template-columns: 1fr; }\n  .hero-visual { display: none; }\n  .hero-trust { grid-template-columns: repeat(2,1fr); gap: 24px; }\n  .calc { grid-template-columns: 1fr; }\n  .calc-result { position: static; }\n  .steps { grid-template-columns: repeat(2,1fr); }\n  .step::after { display: none; }\n  .grid-4 { grid-template-columns: repeat(2,1fr); }\n  .footer-top { grid-template-columns: 1fr 1fr; }\n}\n@media (max-width: 900px) {\n  .nav, .header-phone { display: none; }\n  .burger { display: flex; }\n  .header-right { margin-left: auto; }\n  .compare { grid-template-columns: 1fr; }\n  .incl { grid-template-columns: 1fr; }\n  .comm { grid-template-columns: 1fr; }\n  .about { grid-template-columns: 1fr; }\n  .cta-final { grid-template-columns: 1fr; }\n  .split { grid-template-columns: 1fr; }\n  .split-arrow { padding: 14px; }\n  .split-arrow svg { transform: rotate(90deg); }\n\n  .mobile-menu {\n    display: block; position: fixed; inset: 0 0 0 auto; width: min(86vw, 360px);\n    background: var(--dark-2); z-index: 70; transform: translateX(100%); transition: transform .3s var(--ease);\n    padding: 90px 28px 28px; box-shadow: -20px 0 60px rgba(0,0,0,0.4); overflow-y: auto;\n  }\n  .mobile-menu.open { transform: none; }\n  .mobile-menu a { display: block; padding: 15px 0; font-size: 18px; font-weight: 600; color: var(--white); border-bottom: 1px solid var(--line-dark); }\n  .mobile-menu .btn { margin-top: 22px; }\n  .mobile-menu .mm-phone { margin-top: 18px; font-weight: 700; color: var(--accent); display: block; font-size: 18px; }\n  .menu-backdrop { display: none; position: fixed; inset: 0; background: rgba(23,22,26,0.5); z-index: 65; }\n  .menu-backdrop.open { display: block; }\n}\n@media (max-width: 620px) {\n  body { font-size: 16px; }\n  .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }\n  .steps { grid-template-columns: 1fr; }\n  .hero-cta { flex-direction: column; }\n  .hero-cta .btn { width: 100%; }\n  .res-grid { grid-template-columns: 1fr 1fr; }\n  .about-stats { grid-template-columns: 1fr 1fr; }\n  .footer-top { grid-template-columns: 1fr; }\n  .price-input input { width: 120px; }\n}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<!-- ============ HEADER ============ -->\n<header class=\"site-header\" id=\"siteHeader\">\n  <div class=\"bar\">\n    <a href=\"#top\" class=\"logo\" aria-label=\"Унистрой.Аренда — на главную\">\n      <span class=\"mark-sq\">У<\u002Fspan>\n      <span>Унистрой<small>Аренда<\u002Fsmall><\u002Fspan>\n    <\u002Fa>\n    <nav class=\"nav\" aria-label=\"Основная навигация\">\n      <a href=\"#how\">Как это работает<\u002Fa>\n      <a href=\"#calculator\">Калькулятор<\u002Fa>\n      <a href=\"#advantages\">Преимущества<\u002Fa>\n      <a href=\"#pricing\">Тарифы<\u002Fa>\n      <a href=\"#faq\">Вопросы<\u002Fa>\n    <\u002Fnav>\n    <div class=\"header-right\">\n      <a href=\"tel:+70000000000\" class=\"header-phone\">‹+7 000 000-00-00›<\u002Fa>\n      <button class=\"btn btn-accent\" data-scroll=\"#lead\" style=\"min-height:46px;padding:13px 22px;\">Оставить заявку<\u002Fbutton>\n      <button class=\"burger\" id=\"burger\" aria-label=\"Меню\" aria-expanded=\"false\" aria-controls=\"mobileMenu\">\n        <span><\u002Fspan><span><\u002Fspan><span><\u002Fspan>\n      <\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<div class=\"menu-backdrop\" id=\"menuBackdrop\"><\u002Fdiv>\n<aside class=\"mobile-menu\" id=\"mobileMenu\" aria-label=\"Мобильное меню\">\n  <a href=\"#how\">Как это работает<\u002Fa>\n  <a href=\"#calculator\">Калькулятор<\u002Fa>\n  <a href=\"#advantages\">Преимущества<\u002Fa>\n  <a href=\"#pricing\">Тарифы<\u002Fa>\n  <a href=\"#faq\">Вопросы<\u002Fa>\n  <a href=\"tel:+70000000000\" class=\"mm-phone\">‹+7 000 000-00-00›<\u002Fa>\n  <button class=\"btn btn-accent btn-block\" data-scroll=\"#lead\">Оставить заявку<\u002Fbutton>\n<\u002Faside>\n\n<main id=\"top\">\n\n<!-- ============ HERO ============ -->\n<section class=\"hero on-dark\" aria-label=\"Унистрой.Аренда\">\n  <div class=\"container\">\n    <div class=\"hero-text reveal\">\n      <p class=\"eyebrow\">Доверительная аренда от застройщика<\u002Fp>\n      <h1 class=\"display\">Ваша квартира приносит доход.<br><span class=\"em\">Хлопоты&nbsp;— наши<\u002Fspan><\u002Fh1>\n      <p class=\"lead hero-sub\">Сдавайте квартиру через Унистрой и получайте арендный платёж за вычетом комиссии. Поиск жильцов, заселение, обслуживание и налоги берём на себя.<\u002Fp>\n      <div class=\"hero-cta\">\n        <button class=\"btn btn-accent btn-lg\" data-scroll=\"#calculator\">Рассчитать доход<\u002Fbutton>\n        <button class=\"btn btn-outline btn-lg\" data-scroll=\"#how\">Как это работает<\u002Fbutton>\n      <\u002Fdiv>\n      <div class=\"hero-trust\">\n        <div>\n          <div class=\"trust-num\">‹15›&nbsp;лет<\u002Fdiv>\n          <div class=\"trust-label\">опыт застройщика Унистрой на рынке<\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div class=\"trust-num\">‹1&nbsp;200›<\u002Fdiv>\n          <div class=\"trust-label\">квартир под управлением<\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div class=\"trust-num\">‹94›%<\u002Fdiv>\n          <div class=\"trust-label\">средняя загрузка объектов<\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div class=\"trust-num\">Ежемес.<\u002Fdiv>\n          <div class=\"trust-label\">выплаты собственнику без задержек<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"hero-visual reveal\">\n      <div class=\"hero-card-img ph dark\" data-label=\"фото · светлый интерьер квартиры\" role=\"img\" aria-label=\"Фотография светлого интерьера квартиры Унистрой\"><\u002Fdiv>\n      <div class=\"hero-float\">\n        <div class=\"fl-label\">Доход в месяц<\u002Fdiv>\n        <div class=\"fl-num\">‹54 000› <span>₽<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ PROBLEM ============ -->\n<section class=\"section bg-white\" id=\"problem\">\n  <div class=\"container\">\n    <div class=\"section-head reveal\">\n      <p class=\"eyebrow\">Знакомо?<\u002Fp>\n      <h2 class=\"display\">Сдавать самому&nbsp;— это хлопотно<\u002Fh2>\n      <p class=\"lead\">Аренда обещает пассивный доход, но на деле превращается в постоянные заботы. Мы забираем их все на себя.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"grid grid-3 reveal\">\n      <article class=\"card\">\n        <span class=\"ic\" aria-hidden=\"true\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\"><circle cx=\"11\" cy=\"11\" r=\"7\"><\u002Fcircle><path d=\"M21 21l-4-4\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n        <h3>Поиск и проверка жильцов<\u002Fh3>\n        <p>Объявления, показы, отбор адекватных арендаторов и проверка их платёжеспособности.<\u002Fp>\n      <\u002Farticle>\n      <article class=\"card\">\n        <span class=\"ic\" aria-hidden=\"true\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\"><path d=\"M12 7v5l3 2\"><\u002Fpath><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><\u002Fsvg><\u002Fspan>\n        <h3>Простои между жильцами<\u002Fh3>\n        <p>Каждый месяц без арендатора — это прямой убыток и упущенный доход.<\u002Fp>\n      <\u002Farticle>\n      <article class=\"card\">\n        <span class=\"ic\" aria-hidden=\"true\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\"><path d=\"M4 5h16v11H4z\"><\u002Fpath><path d=\"M8 20h8M12 16v4\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n        <h3>Звонки и переписка<\u002Fh3>\n        <p>«Потёк кран», «соседи шумят», «когда приедете» — в любое время дня и ночи.<\u002Fp>\n      <\u002Farticle>\n      <article class=\"card\">\n        <span class=\"ic\" aria-hidden=\"true\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\"><path d=\"M14 4l6 6-9 9-6 1 1-6z\"><\u002Fpath><path d=\"M13 5l6 6\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n        <h3>Ремонт и форс-мажоры<\u002Fh3>\n        <p>Поломки техники, аварии, износ мебели — всё ложится на собственника.<\u002Fp>\n      <\u002Farticle>\n      <article class=\"card\">\n        <span class=\"ic\" aria-hidden=\"true\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\"><path d=\"M12 3v18M7 8h7a3 3 0 010 6H6\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n        <h3>Контроль оплаты<\u002Fh3>\n        <p>Напоминания о платежах, задержки, споры о депозите и состоянии квартиры.<\u002Fp>\n      <\u002Farticle>\n      <article class=\"card\">\n        <span class=\"ic\" aria-hidden=\"true\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\"><path d=\"M6 3h9l5 5v13H6z\"><\u002Fpath><path d=\"M14 3v5h5M9 13h7M9 17h7\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n        <h3>Налоги и документы<\u002Fh3>\n        <p>Декларации, договоры, акты, отчётность — бюрократия, в которой легко ошибиться.<\u002Fp>\n      <\u002Farticle>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ SOLUTION ============ -->\n<section class=\"section bg-mint\" id=\"solution\">\n  <div class=\"container\">\n    <div class=\"section-head center reveal\">\n      <p class=\"eyebrow\">Решение<\u002Fp>\n      <h2 class=\"display\">Вы получаете только&nbsp;деньги.<br>Всё остальное&nbsp;— <span class=\"mark\">на нас<\u002Fspan><\u002Fh2>\n    <\u002Fdiv>\n    <div class=\"split reveal\">\n      <div class=\"split-col split-you\">\n        <h3 class=\"eyebrow\" style=\"margin-bottom:14px\">Собственник<\u002Fh3>\n        <p class=\"big\">Подписываете договор и&nbsp;получаете доход<\u002Fp>\n        <ul class=\"checklist\">\n          <li><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpat n<\u002Fsection>\n\n<!-- ============ CALCULATOR ============ -->\n<section class=\"section bg-white\" id=\"calculator\">\n  <div class=\"container\">\n    <div class=\"section-head reveal\">\n      <p class=\"eyebrow\">Калькулятор доходности<\u002Fp>\n      <h2 class=\"display\">Узнайте, сколько принесёт ваша квартира<\u002Fh2>\n      <p class=\"lead\">Выберите модель аренды и параметры квартиры — расчёт обновляется мгновенно. Доход показан уже за&nbsp;вычетом нашей комиссии.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"calc reveal\">\n      <!-- INPUT -->\n      <div class=\"calc-panel\">\n        <div class=\"field\">\n          <span class=\"field-label\" id=\"modelLabel\">Модель аренды<\u002Fspan>\n          <div class=\"segment\" id=\"modelSeg\" role=\"tablist\" aria-labelledby=\"modelLabel\">\n            <button role=\"tab\" data-model=\"daily\" aria-selected=\"false\">Посуточная<\u002Fbutton>\n            <button role=\"tab\" data-model=\"longterm\" aria-selected=\"true\">Долгосрочная<\u002Fbutton>\n            <button role=\"tab\" data-model=\"guaranteed\" aria-selected=\"false\">Гарантированная<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"field\">\n          <span class=\"field-label\">Тип квартиры<\u002Fspan>\n          <div class=\"chips\" id=\"typeChips\" role=\"group\" aria-label=\"Тип квартиры\">\n            <button class=\"chip\" data-type=\"studio\" aria-pressed=\"false\">Студия<\u002Fbutton>\n            <button class=\"chip\" data-type=\"r1\" aria-pressed=\"true\">1-комн.<\u002Fbutton>\n            <button class=\"chip\" data-type=\"r2\" aria-pressed=\"false\">2-комн.<\u002Fbutton>\n            <button class=\"chip\" data-type=\"r3\" aria-pressed=\"false\">3-комн.<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"field\">\n          <label class=\"field-label\" for=\"priceInput\">Стоимость квартиры<\u002Flabel>\n          <div class=\"price-row\">\n            <div class=\"pri "lead\" style=\"margin:18px 0 26px\">Унистрой&nbsp;— крупный девелопер с многолетним опытом строительства и управления недвижимостью. «Унистрой.Аренда»&nbsp;— департамент, который применяет тот&nbsp;же стандарт качества и надёжности к доверительной аренде вашей квартиры.<\u002Fp>\n        <div class=\"logos\" aria-label=\"Партнёры и награды\">\n          <div class=\"ph\" data-label=\"лого\"><\u002Fdiv>\n          <div class=\"ph\" data-label=\"лого\"><\u002Fdiv>\n          <div class=\"ph\" data-label=\"награда\"><\u002Fdiv>\n          <div class=\"ph\" data-label=\"награда\"><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"about-stats reveal\">\n        <div class=\"about-stat\"><div class=\"v\">‹15› лет<\u002Fdiv><div class=\"k\">на рынке недвижимости<\u002Fdiv><\u002Fdiv>\n        <div class=\"about-stat\"><div class=\"v\">‹2 млн› м²<\u002Fdiv><div class=\"k\">построено и сдано<\u002Fdiv><\u002Fdiv>\n        <div class=\"about-stat\"><div class=\"v\">‹1 200›<\u002Fdiv><div class=\"k\">квартир под управлением<\u002Fdiv><\u002Fdiv>\n        <div class=\"about-stat\"><div class=\"v\">‹98›%<\u002Fdiv><div class=\"k\">собственников продлевают договор<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ FAQ ============ -->\n<section class=\"section bg-mint\" id=\"faq\">\n  <div class=\"container\">\n    <div class=\"section-head center reveal\">\n      <p class=\"eyebrow\">Вопросы и ответы<\u002Fp>\n      <h2 class=\"display\">Частые вопросы собственников<\u002Fh2>\n    <\u002Fdiv>\n    <div class=\"faq reveal\">\n      <div class=\"faq-item\">\n        <button class=\"faq-q\" aria-expanded=\"false\"><span>Что будет, если квартира простаивает?<\u002Fspan><span class=\"pm\" aria-hidden=\"true\"><\u002Fspan><\u002Fbutton>\n        <div class=\"faq-a\"><div class=\"inner\">При долгосрочной и посуточной моделях мы минимизируем простои за счёт быстрого поиска жильцов и гибкого ценообразования. На гарантированной модели простои полностью на нас — вы получаете фиксированный платёж в любом случае.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"faq-item\">\n        <button class=\"faq-q\" aria-expanded=\"false\"><span>Как и когда происходят выплаты?<\u002Fspan><span class=\"pm\" aria-hidden=\"true\"><\u002Fspan><\u002Fbutton>\n        <div class=\"faq-a\"><div class=\"inner\">Выплаты поступают ежемесячно на вашу карту или счёт в согласованную дату. К каждой выплате прилагается отчёт: доход, удержания и состояние квартиры в личном кабинете.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"faq-item\">\n        <button class=\"faq-q\" aria-expanded=\"false\"><span>Кто платит за ремонт и поломки?<\u002Fspan><span class=\"pm\" aria-hidden=\"true\"><\u002Fspan><\u002Fbutton>\n        <div class=\"faq-a\"><div class=\"inner\">Мелкий текущий ремонт и обслуживание входят в услугу. Крупные работы согласуются с вами заранее. Ущерб по вине арендатора покрывается депозитом и страховкой.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"faq-item\">\n        <button class=\"faq-q\" aria-expanded=\"false\"><span>Какие гарантии вы даёте?<\u002Fspan><span class=\"pm\" aria-hidden=\"true\"><\u002Fspan><\u002Fbutton>\n        <div class=\"faq-a\"><div class=\"inner\">Договор управления, страхование имущества, депозит от арендатора и репутация застройщика Унистрой. На гарантированной модели — фиксированный платёж, закреплённый договором.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"faq-item\">\n        <button class=\"faq-q\" aria-expanded=\"false\"><span>Можно ли забрать квартиру обратно?<\u002Fspan><span class=\"pm\" aria-hidden=\"true\"><\u002Fspan><\u002Fbutton>\n        <div class=\"faq-a\"><div class=\"inner\">Да. Условия и сроки уведомления прописаны в договоре. Мы корректно завершим текущую аренду и вернём вам квартиру по акту.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"faq-item\">\n        <button class=\"faq-q\" aria-expanded=\"false\"><span>Как считаются налоги?<\u002Fspan><span class=\"pm\" aria-hidden=\"true\"><\u002Fspan><\u002Fbutton>\n        <div class=\"faq-a\"><div class=\"inner\">Мы берём на себя налоговое сопровождение: расчёт, декларации и отчётность. Вам не нужно самостоятельно взаимодействовать с ФНС — всё оформляется корректно и вовремя.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"faq-item\">\n        <button class=\"faq-q\" aria-expanded=\"false\"><span>Нужен ли ремонт перед сдачей?<\u002Fspan><span class=\"pm\" aria-hidden=\"true\"><\u002Fspan><\u002Fbutton>\n        <div class=\"faq-a\"><div class=\"inner\">Не обязательно. Мы оценим квартиру и предложим оптимальный вариант: сдавать как есть, в стандарте или с меблировкой. От состояния зависит ставка — это видно в калькуляторе.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"faq-item\">\n        <button class=\"faq-q\" aria-expanded=\"false\"><span>Как я контролирую состояние квартиры?<\u002Fspan><span class=\"pm\" aria-hidden=\"true\"><\u002Fspan><\u002Fbutton>\n        <div class=\"faq-a\"><div class=\"inner\">В личном кабинете вы видите фотоотчёты регулярных проверок, историю заселений и платежей. По запросу организуем дополнительный осмотр.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"faq-item\">\n        <button class=\"faq-q\" aria-expanded=\"false\"><span>Какой минимальный срок договора?<\u002Fspan><span class=\"pm\" aria-hidden=\"true\"><\u002Fspan><\u002Fbutton>\n        <div class=\"faq-a\"><div class=\"inner\">Минимальный срок зависит от модели аренды и обсуждается индивидуально. Чаще всего это от нескольких месяцев — точные условия специалист назовёт после оценки.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"faq-item\">\n        <button class=\"faq-q\" aria-expanded=\"false\"><span>Как расторгнуть договор?<\u002Fspan><span class=\"pm\" aria-hidden=\"true\"><\u002Fspan><\u002Fbutton>\n        <div class=\"faq-a\"><div class=\"inner\">Расторжение возможно с уведомлением в срок, указанный в договоре. Мы завершим обязательства перед арендатором и передадим квартиру вам по акту приёма-передачи.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ FINAL CTA + FORM ============ -->\n<section class=\"section bg-dark on-dark\" id=\"lead\">\n  <div class=\"container\">\n    <div class=\"cta-final\">\n      <div class=\"reveal\">\n        <p class=\"eyebrow\">Оставить заявку<\u002Fp>\n        <h2 class=\"display\">Узнайте доход вашей квартиры<\u002Fh2>\n        <p class=\"lead\" style=\"margin-top:18px\">Оставьте контакты — специалист Унистрой свяжется с вами, оценит квартиру и предложит лучшую модель аренды. Бесплатно и без обязательств.<\u002Fp>\n        <ul class=\"pill-list\">\n          <li><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg>Перезвоним в течение рабочего дня<\u002Fli>\n          <li><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg>Расчёт дохода под вашу квартиру<\u002Fli>\n          <li><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg>Без давления и навязывания<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n\n      <div class=\"form-card reveal\">\n        <form id=\"leadForm\" novalidate=\"\">\n          <div id=\"formFields\">\n            <div class=\"form-grid\">\n              <div class=\"form-field\">\n                <label for=\"fName\">Имя<\u002Flabel>\n                <input type=\"text\" id=\"fName\" name=\"name\" placeholder=\"Как к вам обращаться\" autocomplete=\"name\">\n                <span class=\"err-msg\">Укажите имя<\u002Fspan>\n              <\u002Fdiv>\n              <div class=\"form-field\">\n                <label for=\"fPhone\">Телеф
